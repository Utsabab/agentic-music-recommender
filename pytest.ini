[pytest]
# pytest configuration for the agentic music recommender

# Async mode
asyncio_mode = auto

# Markers for test categorization
markers =
    requires_api_key: mark test as requiring GOOGLE_API_KEY environment variable
    unit: mark test as a unit test (no external dependencies)
    integration: mark test as an integration test
    agentic: mark test as testing the agentic components

# Test paths
testpaths = tests

# Python files to consider
python_files = test_*.py

# Show extra summary info
addopts =
    -v
    --strict-markers
    --tb=short
